<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHF - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-700 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Card Login -->
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <!-- Cabecalho -->
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-8 text-center">
                <div class="w-20 h-20 bg-white rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="fas fa-building text-blue-700 text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">GHF</h1>
                <p class="text-blue-200 mt-1">Sistema de Controle de Experiencia</p>
            </div>

            <!-- Formulario -->
            <div class="p-8">
                <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>Acesso ao Sistema
                </h2>

                {% if erro %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
                    <i class="fas fa-exclamation-circle mr-2"></i>{{ erro }}
                </div>
                {% endif %}

                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-4">
                        <label class="block text-gray-700 text-sm font-medium mb-2">
                            <i class="fas fa-envelope mr-1"></i>E-mail
                        </label>
                        <input type="email" name="email" required
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                               placeholder="seu@email.com">
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-700 text-sm font-medium mb-2">
                            <i class="fas fa-lock mr-1"></i>Senha
                        </label>
                        <div class="relative">
                            <input type="password" name="senha" required id="senha"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-12"
                                   placeholder="Sua senha">
                            <button type="button" onclick="toggleSenha()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
                                <i class="fas fa-eye" id="icon-senha"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit"
                            class="w-full bg-gradient-to-r from-blue-700 to-blue-800 text-white py-3 rounded-lg font-semibold hover:from-blue-800 hover:to-blue-900 transition transform hover:scale-[1.02]">
                        <i class="fas fa-sign-in-alt mr-2"></i>Entrar
                    </button>
                </form>
            </div>

            <!-- Rodape -->
            <div class="bg-gray-50 px-8 py-4 text-center border-t">
                <p class="text-gray-500 text-sm">
                    <i class="fas fa-info-circle mr-1"></i>
                    Acesso restrito a equipe autorizada
                </p>
            </div>
        </div>

        <!-- Info -->
        <div class="mt-6 text-center text-blue-200 text-sm">
            <p><i class="fas fa-phone mr-1"></i>Duvidas? Contate o DP</p>
        </div>
    </div>

    <script>
    function toggleSenha() {
        const input = document.getElementById('senha');
        const icon = document.getElementById('icon-senha');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }
    </script>
</body>
</html>
